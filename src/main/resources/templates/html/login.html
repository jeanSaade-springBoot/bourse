<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
  <meta name="description" content="">
  <meta name="author" content="">
  <link href="img/logo/logo.png" rel="icon">
  <link rel="icon" href="/favicon.ico" type="image/x-icon">
  <title>Libvol - Login</title>
  <link href="/vendor/fontawesome-free/css/all.min.css" rel="stylesheet" type="text/css">
  <link href="/vendor/bootstrap/css/bootstrap.min.css" rel="stylesheet" type="text/css">
  <link href="/css/ruang-admin.min.css" rel="stylesheet">
  <link href="/css/marquee.css" rel="stylesheet">
  <link rel="stylesheet" href="/css/jqx.base.css" type="text/css" />
  <link href="/css/jqx.dark.css" rel="stylesheet">
  <link href="/css/input.css" rel="stylesheet">
  <style>
div#content {
    position: absolute;
    top: 70px;
    color: #8A99B5;
    background-image: linear-gradient(#4c6aa6 -1%, #000306 21%);
    border: #464D5C;
    width: 100%;
    overflow-x: hidden;
    min-height: 650px;
}
a.sign-up-style {
    color: darkorange;
    font-weight: bold;
    font-size: 0.6875rem;
}
.container, .container-fluid, .container-login {
    margin: 6rem auto;
}
 .right-actions {
      margin: 0 3rem ;
      align-items: center;
      gap: .75rem;
    }
</style>
</head>
<body id="page-top">
  <div id="wrapper">
  
    <div id="content-wrapper" class="d-flex flex-column">
     <div id="fixedMenu">
        <!-- TopBar -->
     	<div th:include="${mainmenu}"></div>
        <!-- Topbar -->
      </div>
   <div id="content">
        <!-- Container Fluid-->
        <div class="container-fluid" id="container-wrapper">
          <div class="d-sm-flex align-items-center justify-content-between mb-4" style="display: none !important;">
            <h1 class="h3 mb-0 text-gray-800">Dashboard</h1>
            <ol class="breadcrumb">
              <li class="breadcrumb-item"><a href="./">Home</a></li>
              <li class="breadcrumb-item active" aria-current="page">Dashboard</li>
            </ol>
          </div>

          <div class="mt-5 row justify-content-center g-3">
            <div class="col-5 card">
			<h1 class="form-label fw-bold mt-4 mb-4" >Login to Your Account</h1>
            	 
				  <form>
					  <!-- Email input -->
					  <div class="form-outline mb-4 textfield-outlined">
					    <input type="text" id="username" class="form-control"  placeholder=" "/>
					    <label class="form-label" for="username">Username</label>
					  </div>
					
					  <!-- Password input -->
					  <div class="form-outline mb-4 textfield-outlined">
					    <input type="password" id="password" class="form-control"  placeholder=" " />
					     <label class="form-label" for="password">Password</label>
					  </div>
					
					  <!-- 2 column grid layout for inline styling -->
					  <div class="row mb-4">
					    <div class="col d-flex justify-content-start">
					      <!-- Checkbox -->
					      <div class="form-check p-0">
					        <input class="form-check-input" type="checkbox" value="" id="formLogin"  />
					        <label class="form-check-label" for="formLogin"> Remember me </label>
					      </div>
					    </div>
					
					    <div class="col d-flex justify-content-end">
					      <!-- Simple link -->
					      <a href="/forgotpassword">Forgot password?</a>
					    </div>
					  </div>
					
					  <!-- Submit button -->
					  <button type="button" class="btn btn-primary btn-block btn-style mb-4" id="signIn">Sign in</button>
					  <!-- Register buttons -->
					  <div class="text-center">
					    <p>Not a member? <a href="/register">Register</a></p>
					  </div>
					  <div id="ErrorMessage" class="alert alert-danger" style="display:none"></div>
					</form>  
			</div>
          </div>
         

          <!-- Modal Logout -->
          <div class="modal fade" id="logoutModal" tabindex="-1" role="dialog" aria-labelledby="exampleModalLabelLogout"
            aria-hidden="true">
            <div class="modal-dialog" role="document">
              <div class="modal-content">
                <div class="modal-header">
                  <h5 class="modal-title" id="exampleModalLabelLogout">Ohh No!</h5>
                  <button type="button" class="close" data-dismiss="modal" aria-label="Close">
                    <span aria-hidden="true">&times;</span>
                  </button>
                </div>
                <div class="modal-body">
                  <p>Are you sure you want to logout?</p>
                </div>
                <div class="modal-footer">
                  <button type="button" class="btn btn-outline-primary" data-dismiss="modal">Cancel</button>
                  <a href="login.html" class="btn btn-primary">Logout</a>
                </div>
              </div>
            </div>
          </div>

        </div>
        <!---Container Fluid-->
      </div>
     
      <!-- Footer -->
      <footer class="sticky-footer bg-dark">
        <div class=" my-auto">
           
        </div>
      </footer>
      <!-- Footer -->
    </div>
  </div>

  <!-- Scroll to top -->
  <a class="scroll-to-top rounded" href="#page-top">
    <i class="fas fa-angle-up"></i>
  </a>

</body>
  <script src="/vendor/jquery/jquery.min.js"></script>
  <script src="/js/jqwidgets/jqxcore.js"></script> 
  <script src="/js/jqwidgets/jqxbuttons.js"></script> 
  <script src="/js/config/session_storage.js"></script>
  <script src="/js/bourse/login.js"></script> 
  <script src='/js/bourse/video.js'></script>
</html>
